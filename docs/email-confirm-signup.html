<!DOCTYPE html>
<html lang="zh-TW" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>歡迎加入 PartnerLink</title>
</head>
<body style="margin:0;padding:0;background-color:#e8e3db;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">

  <!-- Preheader -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;font-size:1px;line-height:1px;color:#e8e3db;">
    歡迎加入 PartnerLink — 請確認您的電子郵件地址以啟用帳戶。&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
    style="background-color:#e8e3db;">
    <tr>
      <td align="center" style="padding:52px 16px 60px;">

        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
          style="max-width:520px;">

          <!-- ── TOP ACCENT LINE ─────────────────────────────────────── -->
          <tr>
            <td style="padding-bottom:0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <!-- Wide dark line -->
                  <td style="height:3px;width:72%;background-color:#1a1918;font-size:0;line-height:0;">&nbsp;</td>
                  <!-- Gap -->
                  <td style="width:3%;font-size:0;line-height:0;">&nbsp;</td>
                  <!-- Short warm line -->
                  <td style="height:3px;width:10%;background-color:#b8a898;font-size:0;line-height:0;">&nbsp;</td>
                  <!-- Gap -->
                  <td style="width:3%;font-size:0;line-height:0;">&nbsp;</td>
                  <!-- Dot -->
                  <td style="height:3px;width:3%;background-color:#d4c8ba;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ── CARD ────────────────────────────────────────────────── -->
          <tr>
            <td style="background-color:#ffffff;border-radius:0 0 16px 16px;padding:48px 52px 44px;">

              <!-- Brand mark row -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
                style="margin-bottom:40px;">
                <tr>
                  <!-- Geometric P mark -->
                  <td style="width:32px;vertical-align:middle;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="width:22px;height:22px;border:2px solid #1a1918;
                                   border-radius:2px;font-size:0;line-height:0;">
                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td style="width:10px;height:10px;background-color:#1a1918;
                                         font-size:0;line-height:0;">&nbsp;</td>
                              <td style="width:4px;">&nbsp;</td>
                            </tr>
                            <tr><td colspan="2" style="height:4px;">&nbsp;</td></tr>
                            <tr>
                              <td colspan="2" style="height:4px;background-color:transparent;
                                             font-size:0;line-height:0;">&nbsp;</td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td style="padding-left:10px;vertical-align:middle;">
                    <p style="margin:0;font-family:Georgia,'Times New Roman',serif;
                               font-size:13px;letter-spacing:0.18em;text-transform:uppercase;
                               color:#1a1918;line-height:1;">PartnerLink</p>
                  </td>
                  <!-- Right: issue label -->
                  <td align="right" style="vertical-align:middle;">
                    <p style="margin:0;font-family:Georgia,'Times New Roman',serif;
                               font-size:10px;letter-spacing:0.08em;
                               color:#b0a898;line-height:1;">帳戶驗證</p>
                  </td>
                </tr>
              </table>

              <!-- Headline -->
              <h1 style="margin:0 0 6px;font-family:Georgia,'Times New Roman',serif;
                          font-size:42px;font-weight:normal;color:#1a1918;
                          line-height:1.1;letter-spacing:-0.02em;">
                歡迎加入
              </h1>
              <h2 style="margin:0 0 36px;font-family:Georgia,'Times New Roman',serif;
                          font-size:20px;font-weight:normal;color:#8a8078;
                          line-height:1.2;letter-spacing:0.01em;">
                PartnerLink · 台灣房地產 KOL 平台
              </h2>

              <!-- Rule: two-tone -->
              <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                style="margin-bottom:30px;">
                <tr>
                  <td style="width:48px;height:1px;background-color:#1a1918;
                              font-size:0;line-height:0;">&nbsp;</td>
                  <td style="width:160px;height:1px;background-color:#e0d8d0;
                              font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>

              <!-- Body copy -->
              <p style="margin:0 0 16px;font-family:Georgia,'Times New Roman',serif;
                          font-size:15px;line-height:1.85;color:#4a4540;">
                感謝您的註冊。您的帳戶已建立，請確認您的電子郵件地址以完成帳戶啟用。
              </p>
              <p style="margin:0 0 38px;font-family:Georgia,'Times New Roman',serif;
                          font-size:15px;line-height:1.85;color:#4a4540;">
                完成確認後，請重新登入，系統將正式提交您的申請進行審核。
              </p>

              <!-- CTA Button -->
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <a href="{{ .ConfirmationURL }}"
                       style="display:block;background-color:#1a1918;color:#ffffff;
                              font-family:Georgia,'Times New Roman',serif;
                              font-size:15px;font-weight:normal;
                              text-decoration:none;text-align:center;
                              padding:18px 32px;border-radius:8px;
                              line-height:1.4;">
                      確認電子郵件地址
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- ── FOOTER ──────────────────────────────────────────────── -->
          <tr>
            <td style="padding:24px 52px 0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <!-- Left: disclaimer -->
                  <td style="vertical-align:top;">
                    <p style="margin:0 0 6px;font-family:Georgia,'Times New Roman',serif;
                               font-size:11px;line-height:1.7;color:#9a9490;">
                      如果您沒有建立此帳戶，請忽略此封郵件。
                    </p>
                    <p style="margin:0;font-family:Georgia,'Times New Roman',serif;
                               font-size:10px;color:#b8b2aa;">
                      © 2026 PartnerLink
                    </p>
                  </td>
                  <!-- Right: decorative mark -->
                  <td align="right" style="vertical-align:bottom;padding-left:16px;width:40px;">
                    <p style="margin:0;font-family:Georgia,'Times New Roman',serif;
                               font-size:28px;font-weight:normal;color:#d8d0c8;line-height:1;">
                      P
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
